// 测试核心逻辑
let currentQuestion = 0;
let userAnswers = Array(questions.length).fill(null);
let userScores = {S:0,R:0,E:0,I:0,A:0,Ad:0};

// 加载题目（修复单选框name重复、选中状态）
function loadQuestion(index) {
    const q = questions[index];
    document.getElementById("question-number").textContent = `第${index+1}题 / 共20题`;
    document.getElementById("question-text").textContent = q.text;
    const group = document.getElementById("options-group");
    group.innerHTML = "";
    
    q.options.forEach((opt, i) => {
        const item = document.createElement("div");
        // 动态name，避免所有题目选项互斥
        const radioName = `opt-${index}`;
        item.className = "option-item" + (userAnswers[index] === i ? " selected" : "");
        item.innerHTML = `<input type="radio" name="${radioName}" ${userAnswers[index]===i?'checked':''}><label>${opt.text}</label>`;
        
        item.onclick = () => { 
            userAnswers[index] = i; 
            loadQuestion(index); 
        };
        group.appendChild(item);
    });
    
    document.getElementById("prev-btn").disabled = index === 0;
    document.getElementById("next-btn").style.display = index === 19 ? "none" : "block";
    document.getElementById("submit-btn").style.display = index === 19 ? "block" : "none";
}

// 按钮事件
document.getElementById("next-btn").onclick = () => {
    if(userAnswers[currentQuestion]===null) return showAlert("请先选择一个选项哦！");
    currentQuestion++; 
    loadQuestion(currentQuestion);
};

document.getElementById("prev-btn").onclick = () => { 
    currentQuestion--; 
    loadQuestion(currentQuestion); 
};

// 提交结果
document.getElementById("submit-btn").onclick = () => {
    if(userAnswers.includes(null)) return showAlert("请完成所有题目！");
    
    userScores = {S:0,R:0,E:0,I:0,A:0,Ad:0};
    userAnswers.forEach((ans,i)=>{
        const s=questions[i].options[ans].scores;
        for(let k in s) userScores[k]+=s[k];
    });
    
    // 计算匹配度
    const res=dogBreeds.map(b=>{
        let d=0; 
        for(let k in userScores) {
            d+=Math.pow(userScores[k]-b.profile[k],2);
        }
        return {...b, d:Math.sqrt(d)};
    }).sort((a,b)=>a.d-b.d).slice(0,3);
    
    // 渲染结果
    const box=document.getElementById("result-top3"); 
    box.innerHTML="";
    res.forEach((b,i)=>{
        const maxDistance = 80;
        const p = Math.max(60, Math.round((1 - b.d/maxDistance) * 100)); 
        box.innerHTML+=`<div class="result-card"><h3>${b.name} <span class="match-percent">匹配度${p}%</span></h3><div class="tag">${b.tag}</div><p class="desc">${b.desc}</p></div>`;
    });
    
    testScreen.classList.remove("active"); 
    resultScreen.classList.add("active");
};

// 重新测试
document.getElementById("restart-btn").onclick = () => {
    currentQuestion=0; 
    userAnswers.fill(null);
    resultScreen.classList.remove("active"); 
    testScreen.classList.add("active");
    loadQuestion(0);
};

// 弹窗提示
function showAlert(t) {
    alertText.textContent=t; 
    alertModal.classList.add("active");
}

modalClose.onclick = () => {
    alertModal.classList.remove("active");
};
