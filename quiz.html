            careers: ["舞者", "编舞师", "形体指导", "运动康复师", "瑜伽/普拉提导师", "动作捕捉演员"]

    // 六个维度定义
    const DIM_NAMES = ["观察力", "审美感", "想象力", "情绪感知", "节奏感", "身体控制"];

    // 各天赋对应的理想维度权重（用于计算匹配度）
    const TALENT_WEIGHTS = {
        painting: [0.30, 0.28, 0.18, 0.12, 0.06, 0.06],
        music:    [0.08, 0.20, 0.16, 0.20, 0.28, 0.08],
        performance: [0.12, 0.10, 0.20, 0.28, 0.12, 0.18],
        writing:  [0.24, 0.16, 0.26, 0.22, 0.08, 0.04],
        dance:    [0.06, 0.14, 0.16, 0.14, 0.24, 0.26],

    };

    // 20道题目，每道题对应六个维度的得分影响（李克特量表）
    // 对于每个陈述，不同维度的得分映射：非常像我=+2，像我=+1，中立=0，不像我=-1，非常不像我=-2
    const QUESTIONS = [
        {
            text: "我常常注意到日常生活中的色彩搭配，比如房间的色调、路人的衣着。",
            dimImpacts: [2, 2, 0, 0, 0, 0] // 观察力, 审美感
        },
        {

            dimImpacts: [0, 1, 0, 1, 2, 0]
        },
        {

            dimImpacts: [0, 0, 0, 1, 0, 1]
        },
        {

            dimImpacts: [1, 0, 2, 1, 0, 0]
        },
        {
            text: "我的身体协调性很好，学新的运动或舞蹈动作很快。",
            dimImpacts: [0, 0, 0, 0, 1, 2]
        },
        {
            text: "我享受动手制作小物件的过程，哪怕只是简单的拼装或缝纫。",
            dimImpacts: [0, 1, 0, 0, 0, 2]
        },
        {
            text: "我能快速发现两幅画作在构图或用色上的差异。",
            dimImpacts: [2, 2, 0, 0, 0, 0]
        },
        {
            text: "在聚会中，我常常是活跃气氛的那个，善于模仿或讲故事。",
            dimImpacts: [0, 0, 1, 1, 0, 0]
        },
        {
            text: "阅读小说时，我很容易在脑海中形成画面。",
            dimImpacts: [1, 0, 2, 0, 0, 0]
        },
        {
            text: "我对节奏特别敏感，听歌时会不由自主地打拍子。",
            dimImpacts: [0, 0, 0, 0, 2, 0]
        },
        {
            text: "我习惯从不同角度观察一个物体，想象它的内部结构。",
            dimImpacts: [2, 0, 1, 0, 0, 0]
        },
        {
            text: "我容易被电影或戏剧中的情感打动，甚至落泪。",
            dimImpacts: [0, 0, 0, 2, 0, 0]
        },
        {

            dimImpacts: [0, 0, 0, 0, 0, 2]
        },
        {
            text: "在不熟悉的地方，我仍能自然地运用肢体语言表达自己。",
            dimImpacts: [0, 0, 0, 1, 0, 1]
        },
        {
            text: "我常常能听出一首歌曲中不同乐器的声音层次。",
            dimImpacts: [1, 1, 0, 0, 2, 0]
        },
        {
            text: "比起口头解释，我更擅长用图画或图表来说明问题。",
            dimImpacts: [2, 1, 0, 0, 0, 0]
        },
        {
            text: "我有写日记或创作故事的习惯，哪怕只是碎片化的记录。",
            dimImpacts: [1, 0, 2, 1, 0, 0]
        },
        {

            dimImpacts: [0, 0, 0, 0, 1, 2]
        },
        {
            text: "面对一团乱麻时，我反而能整理出清晰的逻辑线。",
            dimImpacts: [2, 0, 1, 0, 0, 0]
        },
        {
            text: "我喜欢通过触摸来感受不同材质的纹理和温度。",
            dimImpacts: [0, 1, 0, 0, 0, 2]
        }
    ];

    // 选项文字
    const OPTIONS = ["非常像我", "像我", "中立", "不像我", "非常不像我"];
    const OPTION_VALUES = [2, 1, 0, -1, -2];

    let dimScores = [0, 0, 0, 0, 0, 0]; // 六个维度累计分
    let currentQ = 0;
    let unlocked = false;

    const lockScreen = document.getElementById('lockScreen');
    const quizScreen = document.getElementById('quizScreen');
    const resultScreen = document.getElementById('resultScreen');
    const pwInput = document.getElementById('passwordInput');
    const unlockBtn = document.getElementById('unlockBtn');
    const lockError = document.getElementById('lockError');
    const questionCounter = document.getElementById('questionCounter');
    const questionDisplay = document.getElementById('questionDisplay');
    const optionsContainer = document.getElementById('optionsContainer');
    const talentName = document.getElementById('talentName');
    const talentSub = document.getElementById('talentSub');
    const talentDesc = document.getElementById('talentDesc');
    const careerList = document.getElementById('careerList');
    const restartBtn = document.getElementById('restartBtn');
    const lockBtn = document.getElementById('lockBtn');
    const radarCanvas = document.getElementById('radarCanvas');

    function resetScores() {
        dimScores = [0, 0, 0, 0, 0, 0];
    }

    function startQuiz() {
        resetScores(); currentQ=0;
        lockScreen.classList.add('hidden'); resultScreen.classList.add('hidden');
        quizScreen.classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        if(currentQ < QUESTIONS.length) {
            const q = QUESTIONS[currentQ];
            questionDisplay.textContent = q.text;
            questionCounter.textContent = `第${currentQ+1}问 / 共${QUESTIONS.length}问`;
            let html = '';
            for(let i=0; i<OPTIONS.length; i++) {
                html += `<button class="option-btn" data-value="${OPTION_VALUES[i]}" data-index="${i}">${OPTIONS[i]}</button>`;
            }
            optionsContainer.innerHTML = html;
            document.querySelectorAll('.option-btn').forEach(b => {
                b.addEventListener('click', onSelect);
            });
        } else {
            finishQuiz();
        }
    }

    function onSelect(e) {
        const value = parseInt(e.currentTarget.dataset.value);
        const impacts = QUESTIONS[currentQ].dimImpacts;
        // 累加到六个维度
        for(let i=0; i<6; i++) {
            dimScores[i] += impacts[i] * value;
        }
        currentQ++;
        renderQuestion();
    }

    // 将原始分数映射到0-100区间用于雷达图显示
    function normalizeScores() {
        let minScore = Math.min(...dimScores);
        let maxScore = Math.max(...dimScores);
        if(maxScore === minScore) return dimScores.map(() => 50);
        return dimScores.map(s => Math.round((s - minScore) / (maxScore - minScore) * 100));
    }

    function drawRadar(normScores) {
        const ctx = radarCanvas.getContext('2d');
        const w = radarCanvas.width = 320;
        const h = radarCanvas.height = 320;
        const cx = w/2, cy = h/2, r = 115;
        const count = 6;
        ctx.clearRect(0,0,w,h);

        // 网格
        for(let i=1; i<=4; i++) {
            ctx.beginPath();
            ctx.strokeStyle = '#d9cebf';
            ctx.lineWidth = 0.5;
            for(let j=0; j<count; j++) {
                const ang = Math.PI*2/count*j - Math.PI/2;
                const x = cx + r/4*i * Math.cos(ang);
                const y = cy + r/4*i * Math.sin(ang);
                if(j===0) ctx.moveTo(x,y);
                else ctx.lineTo(x,y);
            }
            ctx.closePath();
            ctx.stroke();
        }

        // 轴线和标签
        for(let j=0; j<count; j++) {
            const ang = Math.PI*2/count*j - Math.PI/2;
            const x = cx + r * Math.cos(ang);
            const y = cy + r * Math.sin(ang);
            ctx.beginPath();
            ctx.moveTo(cx,cy);
            ctx.lineTo(x,y);
            ctx.strokeStyle = '#d9cebf';
            ctx.stroke();
            ctx.fillStyle = '#3b3329';
            ctx.font = '12px "Songti SC", "宋体", serif';
            ctx.textAlign = 'center';
            const lx = cx + (r+22) * Math.cos(ang);
            const ly = cy + (r+18) * Math.sin(ang);
            ctx.fillText(DIM_NAMES[j], lx, ly);
        }

        // 数据填充
        ctx.beginPath();
        for(let j=0; j<count; j++) {
            const ang = Math.PI*2/count*j - Math.PI/2;
            const val = normScores[j]/100;
            const x = cx + r*val * Math.cos(ang);
            const y = cy + r*val * Math.sin(ang);
            if(j===0) ctx.moveTo(x,y);
            else ctx.lineTo(x,y);
        }
        ctx.closePath();
        ctx.fillStyle = 'rgba(180,150,120,0.2)';
        ctx.fill();
        ctx.strokeStyle = '#a08a68';
        ctx.lineWidth = 2;
        ctx.stroke();

        // 数据点
        for(let j=0; j<count; j++) {
            const ang = Math.PI*2/count*j - Math.PI/2;
            const val = normScores[j]/100;
            const x = cx + r*val * Math.cos(ang);
            const y = cy + r*val * Math.sin(ang);
            ctx.beginPath();
            ctx.arc(x,y,3.5,0,Math.PI*2);
            ctx.fillStyle = '#a08a68';
            ctx.fill();
        }
    }

    function finishQuiz() {
        // 计算与各天赋的匹配度（余弦相似度）
        let bestTalent = 'painting';
        let bestSimilarity = -1;
        for(let talent in TALENT_WEIGHTS) {
            const weights = TALENT_WEIGHTS[talent];
            // 为了避免维度范围差异，直接使用原始分数进行加权匹配，因为权重也反映了重要性
            let dot = 0, magUser = 0, magTalent = 0;
            for(let i=0; i<6; i++) {
                dot += dimScores[i] * weights[i];
                magUser += dimScores[i] * dimScores[i];
                magTalent += weights[i] * weights[i];
            }
            magUser = Math.sqrt(magUser);
            magTalent = Math.sqrt(magTalent);
            if(magUser === 0 || magTalent === 0) continue;
            const similarity = dot / (magUser * magTalent);
            if(similarity > bestSimilarity) {
                bestSimilarity = similarity;
                bestTalent = talent;
            }
        }

        const detail = TALENT_DETAILS[bestTalent] || TALENT_DETAILS.painting;
        talentName.textContent = detail.name;
        talentSub.textContent = detail.sub;
        talentDesc.textContent = detail.desc;
        careerList.innerHTML = detail.careers.map(c => `<span class="career-tag">${c}</span>`).join('');

        const normScores = normalizeScores();
        drawRadar(normScores);

        quizScreen.classList.add('hidden');
        resultScreen.classList.remove('hidden');
    }

    function resetLock() {
        pwInput.value=''; lockError.textContent=''; unlocked=false;
        quizScreen.classList.add('hidden'); resultScreen.classList.add('hidden');
        lockScreen.classList.remove('hidden');
    }

    unlockBtn.addEventListener('click', ()=>{
        if(pwInput.value.trim()===FIXED_PASSWORD) { unlocked=true; startQuiz(); }
        else { lockError.textContent='口令错误，无法进入鉴定'; pwInput.value=''; }
    });
    pwInput.addEventListener('keypress', e=>{ if(e.key==='Enter') unlockBtn.click(); });
    restartBtn.addEventListener('click', ()=>{ if(unlocked) startQuiz(); else resetLock(); });
    lockBtn.addEventListener('click', resetLock);
    document.addEventListener('contextmenu', e=>e.preventDefault());
    resetLock();
})();
</script>
</body>
</html>
